name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Save production files
        run: |
          cp index.html /tmp/prod-index.html
          cp icon-192.png /tmp/prod-icon-192.png 2>/dev/null || true
          cp icon-512.png /tmp/prod-icon-512.png 2>/dev/null || true
          cp firebase-messaging-sw.js /tmp/prod-sw.js 2>/dev/null || true
          cp manifest.json /tmp/prod-manifest.json 2>/dev/null || true

      - name: Deploy to gh-pages root
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages 2>/dev/null || true

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . --quiet
          fi

          cp /tmp/prod-index.html index.html
          cp /tmp/prod-icon-192.png icon-192.png 2>/dev/null || true
          cp /tmp/prod-icon-512.png icon-512.png 2>/dev/null || true
          cp /tmp/prod-sw.js firebase-messaging-sw.js 2>/dev/null || true
          cp /tmp/prod-manifest.json manifest.json 2>/dev/null || true

          git add index.html icon-192.png icon-512.png firebase-messaging-sw.js manifest.json 2>/dev/null
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "production deploy from main"
          git push --force origin gh-pages
