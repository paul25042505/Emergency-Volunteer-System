name: 簽退提醒通知

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  remind-checkout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install web-push firebase-admin nodemailer

      - name: 執行簽退提醒腳本
        env:
          VAPID_PUBLIC_KEY: "BGcqrd4ZF5ShqfaQuzdsMw2ZC3Bz3IR2Qpwr9n3ofPQSRgwxcr_NgdplWZx5oz-tTSW3KhNoEXGzWGw9MB3oIF0"
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: node .github/scripts/remind-checkout.js
